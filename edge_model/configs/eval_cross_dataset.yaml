experiment_name: eval_cross_dataset
seed: 42
device: cuda

paths:
  project_root: .
  image_data_root: Image_data
  output_root: outputs/edge_detection

dataset:
  eval_dataset: NYUDv2
  eval_split: all
  input_size: 512

loader:
  batch_size: 8
  num_workers: 4
  pin_memory: true

model:
  name: rbcm_fuse
  in_channels: 3
  feature_channels: 32
  rbcm_reduction: 2
  alpha_init: 0.1

eval:
  checkpoint: outputs/edge_detection/local_rbcm_fuse_demo/checkpoints/best.pt
  save_predictions: true
  save_visualizations: true
  max_visual_samples: 32
